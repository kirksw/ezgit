name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.semver.outputs.tag }}
      version: ${{ steps.semver.outputs.version }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          regex='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

          if [[ ! "$tag" =~ $regex ]]; then
            echo "::error::Tag '$tag' is not valid semver (example: v1.2.3)"
            exit 1
          fi

          version="${tag#v}"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          binary_name="ezgit${{ matrix.ext }}"
          artifact_name="ezgit-${{ needs.prepare.outputs.tag }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}"
          ldflags="-X github.com/kirksw/ezgit/internal/version.Value=${{ needs.prepare.outputs.version }}"

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags "$ldflags" -o "dist/${binary_name}" .

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && zip -9 "../${artifact_name}" "${binary_name}")
          else
            tar -C dist -czf "${artifact_name}" "${binary_name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezgit-${{ needs.prepare.outputs.tag }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ezgit-${{ needs.prepare.outputs.tag }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ezgit-${{ needs.prepare.outputs.tag }}-*
          merge-multiple: true

      - name: Extract release notes from RELEASE_NOTES.md
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.prepare.outputs.version }}'
          notes_file='dist/RELEASE_BODY.md'

          awk -v version="$version" '
            $0 ~ "^## " version " - " {in_section=1; next}
            $0 ~ /^## / && in_section {exit}
            in_section {print}
          ' RELEASE_NOTES.md > "$notes_file"

          if ! grep -q '[^[:space:]]' "$notes_file"; then
            echo "::error::No release notes found for version $version in RELEASE_NOTES.md"
            exit 1
          fi

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ezgit-${{ needs.prepare.outputs.tag }}-* > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          body_path: dist/RELEASE_BODY.md
          files: |
            dist/ezgit-${{ needs.prepare.outputs.tag }}-*
            dist/SHA256SUMS.txt
