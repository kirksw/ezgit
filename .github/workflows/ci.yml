name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build .

      - name: Test
        run: go test ./...
